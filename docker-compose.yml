services:
  postgres:
    image: postgres:16-alpine
    container_name: manga_collection_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: manga_collection
      POSTGRES_USER: manga_user
      POSTGRES_PASSWORD: manga_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manga_user -d manga_collection"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga_collection_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://manga_user:manga_password@postgres:5432/manga_collection?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
